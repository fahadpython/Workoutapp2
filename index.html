<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="IronGuide" />
    <meta name="theme-color" content="#0f172a" />
    
    <!-- Icons for iOS -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2548/2548530.png">

    <meta name="description" content="IronGuide Pro - Offline Workout Tracker" />

    <title>IronGuide Pro</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Using Tailwind CDN for simplicity in this setup -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gym: {
                900: '#000000',
                800: '#141414',
                700: '#2A2A2A',
                600: '#4A4A4A',
                accent: '#E4FF00', /* Brutalist neon yellow/green */
                success: '#00FF00',
                warning: '#FF0055', /* Hot pink/red for warnings */
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Anton', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            animation: {
              'in': 'fadeIn 0.3s ease-out',
              'marquee': 'marquee 20s linear infinite',
            },
            keyframes: {
              fadeIn: {
                 '0%': { opacity: '0', transform: 'translateY(10px)' },
                 '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body { background-color: #000000; color: #FFFFFF; overscroll-behavior-y: none; }
      /* Hide scrollbar for clean mobile look */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* Brutalist utilities */
      .grid-bg {
         background-image: 
           linear-gradient(to right, #141414 1px, transparent 1px),
           linear-gradient(to bottom, #141414 1px, transparent 1px);
         background-size: 20px 20px;
      }
      .brutal-border {
         border: 2px solid #333;
      }
      .brutal-shadow {
         box-shadow: 4px 4px 0 #E4FF00;
      }
      
      /* Safe area padding for iPhones with notch */
      .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.1/",
    "react": "https://esm.sh/react@^19.2.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "vite": "https://esm.sh/vite@^7.2.7",
    "lucide-react": "https://esm.sh/lucide-react@^0.559.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.1/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
